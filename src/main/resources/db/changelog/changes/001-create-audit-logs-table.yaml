databaseChangeLog:

  - changeSet:
      id: 001-create-audit-logs-table
      author: shiva

      changes:

        - createTable:
            tableName: audit_logs

            columns:

              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true

                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: username
                  type: VARCHAR(255)

                  constraints:
                    nullable: false

              - column:
                  name: action
                  type: VARCHAR(255)

                  constraints:
                    nullable: false

              - column:
                  name: endpoint
                  type: VARCHAR(500)

              - column:
                  name: http_method
                  type: VARCHAR(20)

              - column:
                  name: created_at
                  type: DATETIME

                  constraints:
                    nullable: false